name: Auto Scraper IQAir Pure

on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap jam
  workflow_dispatch: # Tombol manual di web GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Langkah krusial: menginstall cloudscraper untuk menembus Cloudflare
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Run scraping script
      run: python scraper.py

    # Menyimpan file CSV ke repositori tanpa memicu error jika data kosong
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data AQI: $(date)" && git push)
